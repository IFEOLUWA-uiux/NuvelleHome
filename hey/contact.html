<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | NUVELLE HOME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/config.js"></script>
</head>
<body>
  <div data-header></div>
  <main class="section tint">
    <div class="container contact-grid">
      <section class="contact-card">
        <div class="page-kicker title-breadcrumb"><a href="index.html">Home</a><span>Contact</span></div>
        <span class="label">Contact</span>
        <h1>Visit or message Nuvelle Home.</h1>
        <div class="contact-list">
          <div><strong>Address</strong><br><span class="muted">801 Brickell Ave #1350<br>Miami, FL 33131<br>United States</span></div>
          <a href="tel:+18701940214"><strong>Phone</strong><br><span class="muted">+1 (870) 194-0214</span></a>
          <a href="mailto:nuvellehomedecor@gmail.com"><strong>Email</strong><br><span class="muted">nuvellehomedecor@gmail.com</span></a>
          <div><strong>Hours</strong><br><span class="muted">Monday-Friday: 9:00 AM-5:00 PM<br>Saturday-Sunday: Closed</span></div>
        </div>
        <div class="title-actions">
          <button class="btn btn-primary" type="button" onclick="document.querySelector('[data-chat-panel]')?.classList.add('open')">Chat with Customer Care</button>
        </div>
      </section>
      <section class="map">
        <iframe title="NUVELLE HOME map" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://www.google.com/maps?q=801%20Brickell%20Ave%20%231350%2C%20Miami%2C%20FL%2033131%2C%20United%20States&output=embed"></iframe>
      </section>
    </div>
  </main>
  <div data-footer></div>
  <div data-chat></div>
  <script src="assets/js/storefront.js"></script>
</body>
</html>
